DATA:
  MAX_SAMPLE_INTERVAL: 20 #VTUAV是隔10帧标注，所以间隔实际是200帧
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  SEARCH:
    CENTER_JITTER: 3
    FACTOR: 4.0
    SCALE_JITTER: 0.25
    SIZE: 256
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
    NUMBER: 3    #3帧模版

MODEL:
  PRETRAIN_FILE: ./pretrained/SOTPretrained.pth.tar
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: vit_base_patch16_224_cte_hcm
    STRIDE: 16
    CTE_LOC: [3, 6, 9]
    CTE_KEEP_RATIO: [0.7, 0.7, 0.7]
    JSLOSS_LOC: [4, 7, 10]
    CTE_TEMPLATE_RANGE: 'CTR_POINT'  # choose between ALL, CTR_POINT, CTR_REC, GT_BOX
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256

TEST:
  EPOCH: 5
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
